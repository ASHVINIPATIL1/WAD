<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 12px;
            display: block;
        }

        .sidebar a:hover {
            background-color: #495057;
            color: #fff;
        }

        .card-icon {
            font-size: 2rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
            <div class="pt-3">
                <h4 class="text-white text-center mb-4">Admin Panel</h4>

                <a href="#"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                <a href="#"><i class="bi bi-cart me-2"></i>Orders</a>
                <a href="#"><i class="bi bi-people me-2"></i>Students / Users</a>
                <a href="#"><i class="bi bi-journal-text me-2"></i>Exams</a>
                <a href="#"><i class="bi bi-bar-chart me-2"></i>Reports</a>
                <a href="#"><i class="bi bi-gear me-2"></i>Settings</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4">

            <!-- Top Navbar -->
            <nav class="navbar navbar-light bg-white shadow-sm my-3 rounded">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h5">Dashboard Overview</span>
                    <button class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-person-circle"></i> Admin
                    </button>
                </div>
            </nav>

            <!-- Statistics Cards -->
            <div class="row g-4">
                <div class="col-sm-6 col-lg-3">
                    <div class="card shadow-sm">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6>Total Users</h6>
                                <h3>1,250</h3>
                            </div>
                            <i class="bi bi-people-fill text-primary card-icon"></i>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-lg-3">
                    <div class="card shadow-sm">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6>Orders / Exams</h6>
                                <h3>320</h3>
                            </div>
                            <i class="bi bi-cart-fill text-success card-icon"></i>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-lg-3">
                    <div class="card shadow-sm">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6>Revenue / Fees</h6>
                                <h3>$18K</h3>
                            </div>
                            <i class="bi bi-currency-dollar text-warning card-icon"></i>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-lg-3">
                    <div class="card shadow-sm">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6>Active Exams</h6>
                                <h3>12</h3>
                            </div>
                            <i class="bi bi-journal-check text-danger card-icon"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="card shadow-sm my-5">
                <div class="card-body">
                    <h5 class="card-title">Recent Activities</h5>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>101</td>
                                    <td>John Doe</td>
                                    <td>Student</td>
                                    <td><span class="badge bg-success">Active</span></td>
                                </tr>
                                <tr>
                                    <td>102</td>
                                    <td>Exam - Math</td>
                                    <td>Exam</td>
                                    <td><span class="badge bg-warning">Scheduled</span></td>
                                </tr>
                                <tr>
                                    <td>103</td>
                                    <td>Order #4501</td>
                                    <td>Order</td>
                                    <td><span class="badge bg-info">Completed</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
