<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Registration Form</h1>
    <div>
        <form action="">
            <label for="name">Name: </label>
            <input type="text" placeholder="Enter Your Name."><br><br>

            <label for="Father">Father' Name: </label> 
            <input type="text" placeholder="Enter Father's Name"><br><br>

            <label for="num">Mobile Number: </label>
            <input type="text" placeholder="Enter Mobile Number"><br><br>

            <label for="email">Email: </label>
            <input type="email" placeholder="Enter Email"><br><br>

            <label for="password">Password: </label>
            <input type="password" placeholder="Enter Password"><br><br>

            <label for="date">Birth Date: </label>
            <input type="date" placeholder="DD/MM/YYYY"><br><br>

            <label for="gender">Gender: </label> <br>
            <input type="radio" > <label for="Male">Male</label> 
            <input type="radio" > <label for="female">Female</label> <br><br>

            <label for="dept">Department</label>
            <select name="dept" id="menu">
                <option value="Select Department">Select Department</option>
                <option value="IT">IT</option>
                <option value="CS">CS</option>
                <option value="AIDS">AIDS</option>
                <option value="Mech">Mech</option>
            </select>
            <br><br>

            <label for="message">Message: </label>
            <input type="text" placeholder="Send Your Message" id="message"><br><br>
                
            <input type="submit" value="Submit" id="butt">
            <input type="reset" value="Reset" id="butt">
        </form>
    </div>
</body>
</html>
